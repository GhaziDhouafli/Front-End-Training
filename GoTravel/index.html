<!Doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">

        <!-- Favorite Icon -->
        <link rel="shortcut icon" href="assets/img/favicon.png" type="image/x-icon">

        <!-- REMIXICONS -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css">

        <!-- LOCAL CSS -->
        <link rel="stylesheet" href="assets/css/styles.css">

        <title>GoTravel</title>
    </head>

    <body>
        <header class="header">
            <nav class="nav">

                <a href="#home" class="nav__logo">
                    <img src="assets/img/logo.svg" alt="image">
                    <span>GoTravel</span>
                </a>

                <div class="nav__actions">
                    <div class="nav__menu" id="nav-menu">
                        <ul class="nav__list">

                            <li><a href="#home" class="nav__link">Home</a></li>
                            <li><a href="#destination" class="nav__link">Destination</a></li>
                            <li><a href="#testimonials" class="nav__link">Testimonials</a></li>
                            <li><a href="#gallery" class="nav__link">Gallery</a></li>
                            <li><a href="#contact" class="nav__link">Contact</a></li>

                        </ul>

                        <div class="nav__close" id="nav-close">
                            <i class="ri-close-large-line"></i>
                        </div>
                    </div>

                    <div class="nav__buttons">
                        <i class="ri-moon-fill"></i>
                        <div class="nav__toggle" id="nav-toggle">
                            <i class="ri-menu-line"></i>
                        </div>
                    </div>
                </div>

            </nav>
        </header>

        <!--============= MAIN ===========-->
        <main class = "main">
            <!--============= HOME ===========-->
            <section class = "home__section" id = "home">

                <div class="home__container">
                <div class="home__data">
                    <h1 class="home__title">Travel <br> Around <br> The World</h1>

                    <p class="home__description">
                        Explore the best beautiful tourist spots in the
                        countries and see the world on all your amazing
                        adventures.
                    </p>

                    <a href="#destination" class="home__button">
                        Explore the world
                        <i class="ri-arrow-right-line"></i>
                    </a>
                </div>

                <div class="home__swiper">

                    <img src="assets/img/home-img-1.png" alt="image" class="home__image">
                    <img src="assets/img/home-img-2.png" alt="image" class="home__image">
                    <img src="assets/img/home-img-3.png" alt="image" class="home__image">
                    <img src="assets/img/home-img-4.png" alt="image" class="home__image">

                    <button class="ri-arrow-left-double-line" onclick="plusDivs(-1)"></button>
                    <button class="ri-arrow-right-double-line" onclick="plusDivs(+1)"></button>

                </div>

                </div>
            </section>

            <!--============= DESTINATION ===========-->
            <section class = "destination section" id = "destination">

            </section>

            <!--============= TESTIMONIAL ===========-->
            <section class = "testimonial section" id = "testimonial">

            </section>

            <!--============= GALLERY ===========-->
            <section class = "gallery section" id = "gallery">

            </section>

            <!--============= JOIN ===========-->
            <section class = "join section" id = "join">

            </section>

        </main>

        <!--============= FOOTER ===========-->
        <footer class = "footer">
            
        </footer>

        <!--=============== SCROLLREVEAL ===============-->
        <script src=""></script>

        <!--=============== MAIN JS ===============-->
        <script src="assets/js/main.js"></script>
   </body>
</html>
